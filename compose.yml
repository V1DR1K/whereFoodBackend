name: wherefood

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/v1dr1k/whatplan-frontend:latest}
    restart: unless-stopped
    networks:
      default:
      kaza_default:
        aliases:
          - whatplan-frontend
          - wherefood-frontend
    depends_on:
      backend:
        condition: service_healthy
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/v1dr1k/whatplan-backend:latest}
    restart: unless-stopped
    networks:
      default:
      kaza_default:
        aliases:
          - whatplan-backend
          - wherefood-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
    external: true
    name: wherefood_postgres_data
networks:
  kaza_default:
    external: true
