spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wherefood}
    username: ${DATABASE_USER:wherefood}
    password: ${DATABASE_PASSWORD:wherefood}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  servlet.multipart.max-file-size: 10MB
  servlet.multipart.max-request-size: 11MB
management:
  endpoints.web.base-path: /api/actuator
app:
  jwt-secret: ${JWT_SECRET:change-this-to-a-32-byte-minimum-production-secret}
